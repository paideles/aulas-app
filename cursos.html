<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cursos</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:#fff;
}

/* TOPO */
.top{
  padding:15px;
  background:#4b0000;
}

/* LISTA */
.lista{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:15px;
}

/* CARD */
.card{
  min-width:160px;
  background:#1a0000;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

/* CAPA */
.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

/* TITULO */
.card h3{
  padding:8px;
  font-size:13px;
  color:#ffcc00;
}
</style>
</head>

<body>

<div class="top">
  <h2>📚 Cursos</h2>
</div>

<div id="conteudo"></div>

<script>

// carregar aulas
function carregar(){

  fetch("https://raw.githubusercontent.com/paideles/aulas-app/main/aulas.json")
  .then(res => res.json())
  .then(aulas => {

    window.AULAS = aulas

    let html = `<div class="grid">`

    aulas.forEach((a,i)=>{
      html += `
        <div class="card" onclick="abrir(${i})">
          <img src="${a.capa}">
          <h3>${a.titulo}</h3>
        </div>
      `
    })

    html += `</div>`

    document.getElementById("conteudo").innerHTML = html

  })
}

// abrir vídeo
function abrir(i){

  let aula = window.AULAS[i]

  let videoHTML = ""

  // detectar YouTube
  if(aula.video.includes("youtube") || aula.video.includes("youtu.be")){

    let id = ""

    if(aula.video.includes("watch?v=")){
      id = aula.video.split("watch?v=")[1]
    } else if(aula.video.includes("youtu.be")){
      id = aula.video.split("youtu.be/")[1]
    }

    videoHTML = `
      <iframe width="100%" height="250"
      src="https://www.youtube.com/embed/${id}"
      frameborder="0" allowfullscreen></iframe>
    `
  }

  document.getElementById("conteudo").innerHTML = `
    <h2>${aula.titulo}</h2>
    ${videoHTML}
    <br><br>
    <button onclick="carregar()">⬅️ Voltar</button>
  `
}
  else {
    // link (YouTube)
    document.getElementById("conteudo").innerHTML = `
      <h3>${aula.titulo}</h3>
      <iframe width="100%" height="250"
        src="${converter(aula.video)}"
        frameborder="0" allowfullscreen>
      </iframe>
      <br><br>
      <button onclick="voltar()">⬅️ Voltar</button>
    `
  }
}
// converter link youtube
function converter(link){
  if(link.includes("watch?v=")){
    return link.replace("watch?v=","embed/")
  }
  if(link.includes("youtu.be")){
    return link.replace("youtu.be/","youtube.com/embed/")
  }
  return link
}

function voltar(){
  carregar()
}

carregar()

</script>

</body>
</html>
