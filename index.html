<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Home</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:#fff;
}

.topbar{
  height:40px;
  background:#4b0000;
  display:flex;
  align-items:center;
  padding:0 15px;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
  color:#ffcc00;
}

.sidebar{
  position:fixed;
  top:0;
  left:-250px;
  width:220px;
  height:100%;
  background:#1a0000;
  padding:20px;
  transition:0.3s;
  z-index:999;
}

.sidebar.active{ left:0; }

.menu-item{
  margin:15px 0;
  color:#ffcc00;
  cursor:pointer;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:998;
}

.overlay.active{ display:block; }

/* 🔥 BANNER AGORA MOSTRA A IMAGEM INTEIRA */
.banner{
  height:250px;
  margin:5px;
  border-radius:10px;
  background:url('icon.png') center center/contain no-repeat;
  background-color:#000;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:8px;
  padding:8px;
}

.card{
  background:#1a1a1a;
  border-radius:6px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:80px;
  object-fit:cover;
}

.card h3{
  font-size:12px;
  padding:5px;
}

.video-box{ padding:10px; }

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#8B0000;
  color:#ffcc00;
}

/* 🔥 vídeo clicável */
video, iframe{
  width:100%;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="menu-btn" onclick="abrirMenu()">☰</div>
</div>

<div class="sidebar" id="menu">
  <h2 style="color:#ffcc00;">🔥 2N</h2>
  <div class="menu-item" onclick="go('index.html')">🏠 Início</div>
  <div class="menu-item" onclick="go('admin.html')">🛠️ Admin</div>
</div>

<div class="overlay" id="overlay" onclick="fecharMenu()"></div>

<div class="banner"></div>

<div id="conteudo"></div>

<script>

const URL = "https://raw.githubusercontent.com/paideles/aulas-app/main/aulas.json?v=" + Date.now()

function abrirMenu(){
  document.getElementById("menu").classList.add("active")
  document.getElementById("overlay").classList.add("active")
}

function fecharMenu(){
  document.getElementById("menu").classList.remove("active")
  document.getElementById("overlay").classList.remove("active")
}

function go(p){ location.href = p }

// fullscreen helper
function telaCheia(el){
  if (el.requestFullscreen) {
    el.requestFullscreen()
  } else if (el.webkitRequestFullscreen) {
    el.webkitRequestFullscreen()
  }
}

function carregar(){

  fetch(URL)
  .then(r=>r.json())
  .then(aulas=>{

    window.AULAS = aulas

    let html = `<div class="grid">`

    aulas.forEach((a,i)=>{
      html += `
      <div class="card" onclick="abrir(${i})">
        <img src="${a.capa}">
        <h3>${a.titulo}</h3>
      </div>`
    })

    html += `</div>`

    document.getElementById("conteudo").innerHTML = html
  })
}

// 🔥 ABRIR AULA COM FULLSCREEN NO CLIQUE
function abrir(i){

  let a = window.AULAS[i]
  let video = ""

  if(a.video.includes("youtu")){
    let id = a.video.includes("watch?v=")
      ? a.video.split("watch?v=")[1]
      : a.video.split("youtu.be/")[1]

    video = `
    <iframe src="https://www.youtube.com/embed/${id}"
    frameborder="0" allowfullscreen></iframe>`
  } else {
    video = `
    <video controls onclick="telaCheia(this)">
      <source src="${a.video}" type="video/mp4">
    </video>`
  }

  document.getElementById("conteudo").innerHTML = `
  <div class="video-box">
    <h2>${a.titulo}</h2>
    ${video}
    <br><br>
    <button onclick="carregar()">⬅️ Voltar</button>
  </div>`
}

carregar()

</script>

</body>
</html>
