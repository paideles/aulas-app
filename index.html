<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Home</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:#fff;
}

/* TOPO */
.topbar{
  height:40px;
  background:#4b0000;
  display:flex;
  align-items:center;
  padding:0 15px;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
  color:#ffcc00;
}

/* MENU */
.sidebar{
  position:fixed;
  top:0;
  left:-250px;
  width:220px;
  height:100%;
  background:#1a0000;
  padding:20px;
  transition:0.3s;
  z-index:999;
}

.sidebar.active{ left:0; }

.menu-item{
  margin:15px 0;
  color:#ffcc00;
  cursor:pointer;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:998;
}

.overlay.active{ display:block; }

/* BANNER */
.banner{
  height:120px;
  margin:5px;
  border-radius:5px;
  background:url('./icon.png') center/contain no-repeat;
  background-color:#000;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#1a1a1a;
  border-radius:6px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:90px;
  object-fit:cover;
}

.card h3{
  font-size:13px;
  padding:6px;
}

/* VIDEO */
.video-box{
  padding:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#8B0000;
  color:#ffcc00;
}

</style>
</head>

<body>

<!-- 🔐 PROTEÇÃO -->
<script>
if(!localStorage.getItem("tipo")){
  location.href = "login.html"
}
</script>

<!-- TOPO -->
<div class="topbar">
  <div class="menu-btn" onclick="abrirMenu()">☰</div>
</div>

<!-- BANNER -->
<div class="banner"></div>

<!-- MENU -->
<div class="sidebar" id="menu">
  <h2 style="color:#ffcc00;">🔥 2N</h2>

  <div class="menu-item" onclick="go('index.html')">🏠 Início</div>
  <div class="menu-item" onclick="go('perfil.html')">👤 Perfil</div>
  <div class="menu-item" onclick="go('config.html')">⚙️ Configurações</div>
  <div class="menu-item" onclick="go('ajuda.html')">💬 Ajuda</div>

  <!-- ADMIN -->
  <div id="adm" style="display:none;">
    <div class="menu-item" onclick="go('admin.html')">🛠️ Admin</div>
  </div>

  <div class="menu-item" onclick="sair()">🚪 Sair</div>
</div>

<div class="overlay" id="overlay" onclick="fecharMenu()"></div>

<!-- CONTEÚDO -->
<div id="conteudo">Carregando...</div>

<script>

// MENU
function abrirMenu(){
  document.getElementById("menu").classList.add("active")
  document.getElementById("overlay").classList.add("active")
}

function fecharMenu(){
  document.getElementById("menu").classList.remove("active")
  document.getElementById("overlay").classList.remove("active")
}

function go(p){
  location.href = p
}

// 🔐 ADMIN
if(localStorage.getItem("tipo") === "admin"){
  document.getElementById("adm").style.display = "block"
}

// 🚪 LOGOUT
function sair(){
  localStorage.clear()
  location.href = "login.html"
}

// 🔥 CARREGAR JSON COM PROTEÇÃO
const URL = "https://raw.githubusercontent.com/paideles/aulas-app/main/aulas.json?v=" + Date.now()

function carregar(){

  fetch(URL)
  .then(r=>r.json())
  .then(aulas=>{

    window.AULAS = aulas

    let html = `<div class="grid">`

    aulas.forEach((a,i)=>{
      html += `
      <div class="card" onclick="abrir(${i})">
        <img src="${a.capa}">
        <h3>${a.titulo}</h3>
      </div>`
    })

    html += `</div>`

    document.getElementById("conteudo").innerHTML = html
  })
  .catch(()=>{
    document.getElementById("conteudo").innerHTML = "❌ Erro ao carregar aulas"
  })
}

// ABRIR AULA
function abrir(i){

  let aula = window.AULAS[i]

  let videoHTML = ""

  if(aula.video.includes("youtube") || aula.video.includes("youtu.be")){

    let id = aula.video.includes("watch?v=")
      ? aula.video.split("watch?v=")[1]
      : aula.video.split("youtu.be/")[1]

    videoHTML = `
    <iframe width="100%" height="250"
    src="https://www.youtube.com/embed/${id}"
    frameborder="0" allowfullscreen></iframe>`
  } else {
    videoHTML = `
    <video controls width="100%">
      <source src="${aula.video}" type="video/mp4">
    </video>`
  }

  document.getElementById("conteudo").innerHTML = `
    <div class="video-box">
      <h2>${aula.titulo}</h2>
      ${videoHTML}
      <br><br>
      <button onclick="carregar()">⬅️ Voltar</button>
    </div>
  `
}

carregar()

</script>

</body>
</html>
