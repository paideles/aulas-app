<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Home</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:#fff;
}

/* TOPO */
.topbar{
  height:40px;
  background:#4b0000;
  display:flex;
  align-items:center;
  padding:0 15px;
}

.menu-btn{
  font-size:24px;
  cursor:pointer;
  color:#ffcc00;
}

/* MENU */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:230px;
  height:100%;
  background:#1a0000;
  padding:20px;
  transition:0.3s;
  z-index:1000;
}

.sidebar.active{
  left:0;
}

.menu-item{
  margin:15px 0;
  color:#ffcc00;
  cursor:pointer;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  z-index:999;
}

.overlay.active{
  display:block;
}

/* BANNER */
.banner{
  height:160px;
  margin:5px;
  border-radius:8px;
  background:url('icon.png') center/contain no-repeat;
  background-color:#000;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#1a1a1a;
  border-radius:8px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:90px;
  object-fit:cover;
}

.card h3{
  font-size:13px;
  padding:6px;
}

/* VIDEO */
.video-box{
  padding:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#8B0000;
  color:#ffcc00;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- TOPO -->
<div class="topbar">
  <div class="menu-btn" id="btnMenu">☰</div>
</div>

<!-- MENU -->
<div class="sidebar" id="menu">
  <h2 style="color:#ffcc00;">🔥 2N</h2>

  <div class="menu-item" onclick="go('index.html')">🏠 Início</div>
  <div class="menu-item" onclick="go('admin.html')">🛠️ Admin</div>
  <div class="menu-item" onclick="sair()">🚪 Sair</div>
</div>

<div class="overlay" id="overlay"></div>

<!-- BANNER -->
<div class="banner"></div>

<!-- CONTEÚDO -->
<div id="conteudo"></div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// 🔐 LOGIN
if(!localStorage.getItem("tipo")){
  location.href = "login.html"
}

// 🔥 SUPABASE
const supabase = window.supabase.createClient(
  "https://rokyxzsnxsuabigohmpm.supabase.co",
  "sb_publishable_7yZNrxHvrI11LCaeJLsVvQ_-9sXaG6P"
)

// 🎯 MENU (SEM BUG)
const btnMenu = document.getElementById("btnMenu")
const menu = document.getElementById("menu")
const overlay = document.getElementById("overlay")

btnMenu.addEventListener("click", () => {
  menu.classList.add("active")
  overlay.classList.add("active")
})

overlay.addEventListener("click", () => {
  menu.classList.remove("active")
  overlay.classList.remove("active")
})

// 🔗 NAVEGAÇÃO
function go(p){
  location.href = p
}

function sair(){
  localStorage.clear()
  location.href = "login.html"
}

// 📚 CARREGAR AULAS
async function carregar(){

  let { data, error } = await supabase
    .from("aulas")
    .select("*")
    .order("id", { ascending: false })

  if(error){
    document.getElementById("conteudo").innerHTML = "❌ Erro ao carregar"
    console.log(error)
    return
  }

  if(!data || !data.length){
    document.getElementById("conteudo").innerHTML = "⚠️ Nenhuma aula"
    return
  }

  window.AULAS = data

  let html = `<div class="grid">`

  data.forEach((a,i)=>{
    html += `
    <div class="card" onclick="abrir(${i})">
      <img src="${a.capa}">
      <h3>${a.titulo}</h3>
    </div>`
  })

  html += `</div>`

  document.getElementById("conteudo").innerHTML = html
}

// 🎬 ABRIR AULA
function abrir(i){

  let aula = window.AULAS[i]

  let videoHTML = ""

  if(aula.video.includes("youtube") || aula.video.includes("youtu.be")){

    let id = aula.video.includes("watch?v=")
      ? aula.video.split("watch?v=")[1]
      : aula.video.split("youtu.be/")[1]

    videoHTML = `
    <iframe width="100%" height="250"
    src="https://www.youtube.com/embed/${id}"
    frameborder="0" allowfullscreen></iframe>`
  } else {
    videoHTML = `
    <video controls width="100%">
      <source src="${aula.video}" type="video/mp4">
    </video>`
  }

  document.getElementById("conteudo").innerHTML = `
    <div class="video-box">
      <h2>${aula.titulo}</h2>
      ${videoHTML}
      <br><br>
      <button onclick="carregar()">⬅️ Voltar</button>
    </div>`
}

// 🚀 INICIAR
carregar()

</script>

</body>
</html>
