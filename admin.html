 <!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body{
  background:#0a0a0a;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

input{
  width:80%;
  padding:10px;
  margin:8px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  background:#8B0000;
  color:#ffcc00;
  border:none;
  border-radius:8px;
}

.item{
  background:#1a1a1a;
  margin:10px;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- 🔐 PROTEÇÃO -->
<script>
if(localStorage.getItem("tipo") !== "admin"){
  location.href = "login.html"
}
</script>

<h2>🛠️ Admin - Aulas</h2>

<input id="titulo" placeholder="Título"><br>
<input id="video" placeholder="Link do vídeo"><br>

<button onclick="salvar()">➕ Adicionar Aula</button>

<hr>

<h3>📚 Aulas</h3>
<div id="lista"></div>

<script>

const URL = "https://raw.githubusercontent.com/paideles/aulas-app/main/aulas.json"

let aulas = []
let editIndex = null

// CARREGAR AULAS
function carregar(){

  fetch(URL)
  .then(r=>r.json())
  .then(data=>{
    aulas = data
    render()
  })
}

// MOSTRAR LISTA
function render(){

  let html = ""

  aulas.forEach((a,i)=>{
    html += `
    <div class="item">
      <b>${a.titulo}</b><br>

      <button onclick="editar(${i})">✏️ Editar</button>
      <button onclick="remover(${i})">🗑️ Remover</button>
    </div>
    `
  })

  document.getElementById("lista").innerHTML = html
}

// ➕ SALVAR
async function salvar(){

  const token = "COLE_SEU_TOKEN_AQUI"
  const repo = "paideles/aulas-app"
  const path = "aulas.json"

  let res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`)
  let data = await res.json()

  let lista = JSON.parse(atob(data.content))

  let nova = {
    titulo: document.getElementById("titulo").value,
    video: document.getElementById("video").value,
    capa: "icon.png"
  }

  lista.push(nova)

  let novo = btoa(JSON.stringify(lista, null, 2))

  await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
    method:"PUT",
    headers:{
      Authorization:`token ${token}`
    },
    body: JSON.stringify({
      message:"add aula",
      content: novo,
      sha: data.sha
    })
  })

  carregar()
}

// ✏️ EDITAR
function editar(i){
  document.getElementById("titulo").value = aulas[i].titulo
  document.getElementById("video").value = aulas[i].video
  editIndex = i
}

// 🗑️ REMOVER
async function remover(i){

  const token = "COLE_SEU_TOKEN_AQUI"
  const repo = "paideles/aulas-app"
  const path = "aulas.json"

  let res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`)
  let data = await res.json()

  let lista = JSON.parse(atob(data.content))

  lista.splice(i,1)

  let novo = btoa(JSON.stringify(lista, null, 2))

  await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
    method:"PUT",
    headers:{
      Authorization:`token ${token}`
    },
    body: JSON.stringify({
      message:"remove aula",
      content: novo,
      sha: data.sha
    })
  })

  carregar()
}

carregar()

</script>

</body>
</html>
