<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin Seguro</title>

<style>
body{
  background:#0a0a0a;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

input{
  width:80%;
  padding:10px;
  margin:8px;
  border-radius:8px;
  border:none;
}

button{
  padding:12px;
  margin:8px;
  background:#8B0000;
  color:#ffcc00;
  border:none;
  border-radius:8px;
}

img{
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>🛠️ Criar Aula</h2>

<input id="titulo" value="Ferramentas"><br>

<input type="file" id="capaInput" accept="image/*"><br>
<img id="preview" width="120"><br>

<button onclick="salvar()">Salvar Aula</button>
<button onclick="resetar()">🧹 Corrigir JSON</button>

<p id="msg"></p>

<script>

let capaBase64 = ""

// 📷 CAPA
document.getElementById("capaInput").addEventListener("change", function(e){

  let file = e.target.files[0]
  if(!file) return

  let reader = new FileReader()

  reader.onload = function(){
    capaBase64 = reader.result
    preview.src = capaBase64
  }

  reader.readAsDataURL(file)
})


// 💾 SALVAR COM PROTEÇÃO
async function salvar(){

  let titulo = document.getElementById("titulo").value

  if(!titulo){
    msg.innerText = "Digite o título"
    return
  }

  const token = "COLE_SEU_TOKEN_AQUI"
  const repo = "paideles/aulas-app"
  const path = "aulas.json"

  try{

    let res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`)
    let data = await res.json()

    let aulas = []

    try{
      let conteudo = atob(data.content)
      aulas = JSON.parse(conteudo)
    }catch(e){
      // se JSON estiver quebrado
      aulas = []
    }

    aulas.push({
      titulo: titulo,
      video: "https://youtu.be/dQw4w9WgXcQ",
      capa: capaBase64 || "icon.png"
    })

    let novo = btoa(JSON.stringify(aulas, null, 2))

    await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
      method:"PUT",
      headers:{
        Authorization:`token ${token}`
      },
      body: JSON.stringify({
        message:"nova aula",
        content: novo,
        sha: data.sha
      })
    })

    msg.innerText = "✅ Aula salva com segurança!"

  }catch(e){
    msg.innerText = "❌ Erro: " + e
    console.log(e)
  }

}


// 🧹 RESETAR JSON (ANTI BUG)
async function resetar(){

  const token = "COLE_SEU_TOKEN_AQUI"
  const repo = "paideles/aulas-app"
  const path = "aulas.json"

  let res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`)
  let data = await res.json()

  let vazio = btoa(JSON.stringify([], null, 2))

  await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
    method:"PUT",
    headers:{
      Authorization:`token ${token}`
    },
    body: JSON.stringify({
      message:"reset json",
      content: vazio,
      sha: data.sha
    })
  })

  msg.innerText = "🧹 JSON corrigido!"
}

</script>

</body>
</html>
